# Publish SE4X Companion to Google Play (internal) and TestFlight.
#
# Trigger: push a tag matching `v*` (e.g. v1.0.0) or run manually via workflow_dispatch.
#
# Required GitHub repository secrets (configure in Settings → Secrets and variables → Actions):
#
# Android:
#   ANDROID_KEYSTORE_BASE64         — upload keystore (.jks) base64-encoded
#   ANDROID_KEYSTORE_PASSWORD       — keystore password
#   ANDROID_KEY_PASSWORD            — key password
#   ANDROID_KEY_ALIAS               — key alias
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON — Play Console service account JSON (full file)
#
# iOS:
#   APPLE_P12_CERTIFICATE_BASE64        — Apple distribution certificate (.p12) base64
#   APPLE_P12_PASSWORD                  — p12 password
#   APP_STORE_CONNECT_ISSUER_ID         — from App Store Connect API
#   APP_STORE_CONNECT_API_KEY_ID        — key ID
#   APP_STORE_CONNECT_API_PRIVATE_KEY   — .p8 private key contents
#
# Jobs skip gracefully if their required secrets are missing.

name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  android:
    name: Build & Publish Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check for Android signing secrets
        id: android_secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "present=false" >> $GITHUB_OUTPUT
            echo "::warning::Android signing secrets missing — building unsigned AAB artifact only."
          else
            echo "present=true" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        if: steps.android_secrets.outputs.present == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Write key.properties
        if: steps.android_secrets.outputs.present == 'true'
        run: |
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play (internal track)
        if: steps.android_secrets.outputs.present == 'true' && secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.trunz.se4xcompanion
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

  ios:
    name: Build & Publish iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check for iOS signing secrets
        id: ios_secrets
        run: |
          if [ -z "${{ secrets.APPLE_P12_CERTIFICATE_BASE64 }}" ]; then
            echo "present=false" >> $GITHUB_OUTPUT
            echo "::warning::iOS signing secrets missing — skipping iOS build."
          else
            echo "present=true" >> $GITHUB_OUTPUT
          fi

      - name: Import signing certificate
        if: steps.ios_secrets.outputs.present == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_P12_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_P12_PASSWORD }}

      - name: Download provisioning profiles
        if: steps.ios_secrets.outputs.present == 'true'
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.trunz.se4xcompanion
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Install dependencies
        if: steps.ios_secrets.outputs.present == 'true'
        run: flutter pub get

      - name: Build IPA
        if: steps.ios_secrets.outputs.present == 'true'
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        if: steps.ios_secrets.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: steps.ios_secrets.outputs.present == 'true'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
